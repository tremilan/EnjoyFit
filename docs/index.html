<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enjoy Team</title>
  <meta name="description" content="Enjoy Team — nový web. Připravujeme.">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header class="site-header">
    <div class="container site-header__inner">
      <a href="./" class="site-header__logo">Enjoy Team</a>
      <nav class="site-header__nav" aria-label="Hlavní navigace">
        <a href="./" class="is-active">Úvod</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <p class="hero__eyebrow">Nový web</p>
        <h1 class="hero__title">Enjoy Team</h1>
        <p class="hero__lead">
          Základ projektu je připraven. Tady vznikne web pro nového klienta — obsah, design a podstránky doplníme v dalších krocích.
        </p>
        <a href="#kontakt" class="btn btn--primary">Domluvit konzultaci</a>
      </div>
    </section>

    <section id="kontakt" class="container" style="padding-bottom: 5rem; text-align: center;">
      <h2>Kontakt</h2>
      <p style="color: var(--color-text-muted);">Sekce připravena k doplnění údajů klienta.</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span data-year></span> Enjoy Team</p>
    </div>
  </footer>

  <script src="js/main.js" defer></script>
</body>
</html>
